name: Cleanup Worker preview deployments

# When a PR closes (merged or otherwise), delete the Cloudflare Worker
# preview deployment(s) whose alias matches that PR's head branch. The
# latest deployment is protected by Cloudflare itself — the DELETE API
# refuses to remove it — so the production deployment can't be hit even
# by accident.
#
# Branch -> alias mapping: GitHub allows "/" in refs; Cloudflare aliases
# don't, so they're flattened with "-" (e.g. feat/foo -> feat-foo).

on:
  pull_request:
    types: [closed]

permissions:
  contents: read

jobs:
  delete-previews:
    name: Delete previews for ${{ github.event.pull_request.head.ref }}
    runs-on: ubuntu-latest
    env:
      CF_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CF_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      CF_SCRIPT: ttnn-eltwise-performance
      BRANCH_REF: ${{ github.event.pull_request.head.ref }}
    steps:
      - name: Delete preview deployments for branch
        run: |
          set -euo pipefail

          if [[ -z "${CF_API_TOKEN:-}" || -z "${CF_ACCOUNT_ID:-}" ]]; then
            echo "::error::CLOUDFLARE_API_TOKEN and CLOUDFLARE_ACCOUNT_ID secrets must be set."
            exit 1
          fi

          # Flatten branch ref to the alias form Cloudflare uses.
          alias="${BRANCH_REF//\//-}"
          echo "Looking for deployments aliased to '${alias}' (from PR branch '${BRANCH_REF}')."

          api="https://api.cloudflare.com/client/v4/accounts/${CF_ACCOUNT_ID}/workers/scripts/${CF_SCRIPT}/deployments"

          resp=$(curl -sS -H "Authorization: Bearer ${CF_API_TOKEN}" "${api}")
          if [[ "$(jq -r '.success' <<<"$resp")" != "true" ]]; then
            echo "::error::Failed to list deployments:"
            jq '.errors' <<<"$resp"
            exit 1
          fi

          # Run jq in the current shell (not in process substitution) so a
          # non-zero exit fails the step under `set -e` instead of being
          # swallowed and producing a false "no deployments found" no-op.
          ids_str=$(jq -r --arg alias "$alias" \
            '.result.deployments[] | select(.annotations["workers/alias"] == $alias) | .id' \
            <<<"$resp")

          if [[ -z "$ids_str" ]]; then
            echo "No preview deployments found for alias '${alias}'."
            exit 0
          fi

          mapfile -t ids <<<"$ids_str"

          echo "Deleting ${#ids[@]} deployment(s):"
          failures=0
          for id in "${ids[@]}"; do
            echo "  - ${id}"
            status=$(curl -sS -o /tmp/cf-del.json -w "%{http_code}" -X DELETE \
              -H "Authorization: Bearer ${CF_API_TOKEN}" "${api}/${id}")
            if [[ "$status" == "200" || "$status" == "204" ]]; then
              echo "    deleted"
              continue
            fi

            # Cloudflare returns 400 with a "latest deployment" message when
            # you try to delete the active deployment — that's expected
            # protection, not a workflow bug. Any other failure (auth, 5xx,
            # unexpected error) should fail the job loudly.
            err_msg=$(jq -r '.errors[0].message // ""' /tmp/cf-del.json 2>/dev/null || echo "")
            if [[ "$err_msg" == *latest* || "$err_msg" == *active* ]]; then
              echo "    skipped (latest/active deployment, protected by API)"
            else
              echo "::error::Failed to delete ${id} (HTTP ${status}): ${err_msg}"
              cat /tmp/cf-del.json || true
              echo
              failures=$((failures + 1))
            fi
          done

          if (( failures > 0 )); then
            echo "::error::${failures} deployment deletion(s) failed."
            exit 1
          fi
