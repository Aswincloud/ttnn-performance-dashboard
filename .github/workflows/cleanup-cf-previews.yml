name: Cleanup Cloudflare Pages previews

# Deletes all Cloudflare Pages preview deployments tied to a PR's head branch
# once the PR is closed (merged or otherwise). Production deployments and
# previews from other branches are untouched.

on:
  pull_request:
    types: [closed]

permissions:
  contents: read

jobs:
  delete-previews:
    name: Delete previews for ${{ github.event.pull_request.head.ref }}
    runs-on: ubuntu-latest
    env:
      CF_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CF_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      CF_PROJECT: ttnn-performance-dashboard
      BRANCH: ${{ github.event.pull_request.head.ref }}
    steps:
      - name: Delete preview deployments for branch
        run: |
          set -euo pipefail

          if [[ -z "${CF_API_TOKEN:-}" || -z "${CF_ACCOUNT_ID:-}" ]]; then
            echo "::error::CLOUDFLARE_API_TOKEN and CLOUDFLARE_ACCOUNT_ID secrets must be set."
            exit 1
          fi

          api="https://api.cloudflare.com/client/v4/accounts/${CF_ACCOUNT_ID}/pages/projects/${CF_PROJECT}/deployments"

          # Paginate through preview deployments and collect IDs whose source
          # branch matches the closed PR's head ref.
          ids=()
          page=1
          while :; do
            resp=$(curl -sS -H "Authorization: Bearer ${CF_API_TOKEN}" \
              "${api}?env=preview&page=${page}&per_page=25")

            success=$(jq -r '.success' <<<"$resp")
            if [[ "$success" != "true" ]]; then
              echo "::error::Cloudflare API call failed:"
              jq '.errors' <<<"$resp"
              exit 1
            fi

            count=$(jq '.result | length' <<<"$resp")
            [[ "$count" == "0" ]] && break

            while IFS= read -r id; do
              ids+=("$id")
            done < <(jq -r --arg branch "$BRANCH" \
              '.result[] | select(.deployment_trigger.metadata.branch == $branch) | .id' \
              <<<"$resp")

            (( count < 25 )) && break
            page=$((page + 1))
          done

          if (( ${#ids[@]} == 0 )); then
            echo "No preview deployments found for branch '${BRANCH}'."
            exit 0
          fi

          echo "Deleting ${#ids[@]} preview deployment(s) for branch '${BRANCH}':"
          for id in "${ids[@]}"; do
            echo "  - ${id}"
            status=$(curl -sS -o /tmp/cf-del.json -w "%{http_code}" -X DELETE \
              -H "Authorization: Bearer ${CF_API_TOKEN}" \
              "${api}/${id}?force=true")
            if [[ "$status" != "200" ]]; then
              echo "::warning::Failed to delete ${id} (HTTP ${status}):"
              cat /tmp/cf-del.json
            fi
          done
