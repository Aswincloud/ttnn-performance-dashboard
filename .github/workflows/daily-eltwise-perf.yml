name: Daily eltwise perf (tt-metal)

# Drives a Tenstorrent eltwise perf run end to end, unattended:
#   rebase our tt-metal branch on upstream main -> dispatch ONE test-dispatch
#   run that fans out to 2 boards x 2 shapes x 5 shards off a single build
#   -> poll it to completion -> download the 20 raw shard artifacts and merge
#   each combo's 5 shards locally (tt-metal uploads raw shards; we do the merge)
#   -> land the 4 combined JSONs under data/workflow/{n150,p100a}/{small,large}/
#   via a single auto-merging PR.
#
# The tt-metal calls need push/workflow access to tenstorrent/tt-metal, which
# this repo's GITHUB_TOKEN/App does not have, so they use the TT_METAL_PAT
# secret (Aswinmcw's classic PAT, repo+workflow scopes).

on:
  schedule:
    - cron: "30 19 * * *"   # 19:30 UTC = 01:00 IST daily (both boards) — MAIN run.
    # Runs the prior UTC day, but the perf script stamps measurement_date in IST
    # and the guard step below dates the file in IST, so the dashboard shows the
    # correct IST run day (not the previous UTC day).
    - cron: "30 23 * * *"   # 23:30 UTC — SAFETY-NET. ~4h after the main run, by
    # which the tt-metal run (queue + ~3h exec) has finished. If the main run got
    # cancelled/killed before ingesting (as on 2026-07-16, when the hosted runner
    # was SIGTERM'd mid-poll but the tt-metal run itself succeeded), this pass
    # detects the missing day and ingests the newest successful tt-metal run
    # instead of re-dispatching. No-op (silent) when today's data already landed.
  workflow_dispatch:
    inputs:
      mode:
        description: "normal = rebase+dispatch+poll+ingest; recover = skip all that and just ingest an already-completed tt-metal run"
        type: choice
        options: [normal, recover]
        default: normal
      run_id:
        description: "recover only: tt-metal test-dispatch run id to ingest (blank = newest successful run on the branch)"
        required: false
        default: ""

# Never cancel an in-flight run: it owns viommu hardware jobs on tt-metal's
# shared pool, and a scheduled run must not orphan them.
concurrency:
  group: daily-eltwise-perf
  cancel-in-progress: false

permissions:
  contents: read
  issues: write            # GITHUB_TOKEN files/dedupes failure & conflict issues

env:
  OUR_REPO: Aswincloud/ttnn-performance-dashboard
  TT_REPO: tenstorrent/tt-metal
  TT_BRANCH: Aswinmcw/test_eltwise_perf
  RAW_BASE: https://raw.githubusercontent.com/Aswincloud/ttnn-performance-dashboard/main
  # The tt-metal matrix is board x shape x 5 shards; each cell yields a shard
  # artifact eltwise-perf-results-<HW>-<SHAPE>-shard-<i>. We download all 20 and
  # merge per (board, shape) into data/workflow/<hw lowercased>/<shape>/.
  BOARDS: "N150 P100a"
  SHAPES: "small large"

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 355   # < GitHub's hard 6h (360m) hosted-runner cap; the
                           # poll deadline itself is 5.5h (see DEADLINE below)
    steps:
      # 0. Checkout our repo (commit base) + compute the run date.
      - name: Checkout dashboard repo
        uses: actions/checkout@v7
        with:
          fetch-depth: 0
          # Don't persist GITHUB_TOKEN as a git http.extraheader: it would
          # override the App token we embed in the push URL for the result PR
          # (git applies the extraheader to any github.com push), causing a 403
          # as github-actions[bot]. All steps here authenticate explicitly.
          persist-credentials: false

      # 0a. Classify this invocation into one of three modes, consumed by the
      #     `if:` on every later step:
      #       normal     — rebase + dispatch + poll + ingest (the daily run).
      #       recover    — manual `mode=recover`: skip rebase/dispatch/poll and
      #                    ingest an already-completed tt-metal run.
      #       safety-net — the 23:30 UTC cron: same as recover, but first checks
      #                    whether today's data is already present and no-ops if so.
      #     The two crons are told apart by github.event.schedule.
      - name: Detect mode
        id: mode
        env:
          EVENT: ${{ github.event_name }}
          SCHEDULE: ${{ github.event.schedule }}
          INPUT_MODE: ${{ github.event.inputs.mode }}
        run: |
          set -euo pipefail
          if [ "$EVENT" = "schedule" ] && [ "$SCHEDULE" = "30 23 * * *" ]; then
            MODE=safety-net
          elif [ "$EVENT" = "workflow_dispatch" ] && [ "${INPUT_MODE:-normal}" = "recover" ]; then
            MODE=recover
          else
            MODE=normal
          fi
          echo "mode=$MODE" >> "$GITHUB_OUTPUT"
          echo "🧭 mode=$MODE (event=$EVENT schedule='${SCHEDULE:-}' input='${INPUT_MODE:-}')"

      - name: Compute run date
        id: guard
        run: |
          set -euo pipefail
          # No idempotency skip: result filenames are timestamped and land in
          # per-board subdirs, so a same-day re-run never collides.
          # IST, not UTC: the cron is 1:00 AM IST (19:30 UTC of the prior day),
          # so a UTC date here would label the file/branch/PR the previous day —
          # mismatching the IST measurement_date the perf script now stamps. Use
          # Asia/Kolkata so the filename prefix agrees with the in-file date.
          # NOTE: in recover/safety-net the authoritative date is re-derived at
          # commit time from the merged file's metadata.measurement_date (a run
          # recovered the next morning must NOT be dated "today"); this value is
          # the normal-mode date and the safety-net gap-check's "today (IST)".
          echo "date=$(TZ='Asia/Kolkata' date +%F)" >> "$GITHUB_OUTPUT"

      # 0b. Safety-net only: if today's data already landed, stop here (success,
      #     silent). Checks the primary combo's dated file on the checked-out
      #     main. Any other mode falls through. Emits present=true|false so the
      #     later heavy steps can be skipped wholesale when nothing's missing.
      - name: Safety-net gap check
        id: gap
        if: steps.mode.outputs.mode == 'safety-net'
        env:
          DATE: ${{ steps.guard.outputs.date }}
        run: |
          set -euo pipefail
          # Primary combo n150/small is written every successful run, so its
          # presence for DATE is a faithful proxy for "the day was ingested".
          if ls "data/workflow/n150/small/${DATE}_"*.json >/dev/null 2>&1; then
            echo "present=true" >> "$GITHUB_OUTPUT"
            echo "✅ ${DATE} data already present — safety-net has nothing to do."
          else
            echo "present=false" >> "$GITHUB_OUTPUT"
            echo "⚠️ ${DATE} data missing — safety-net will ingest the newest successful tt-metal run."
          fi

      # 0c. Collapse mode + gap-check into two booleans so every later step gates
      #     on a single equality instead of a repeated 3-clause expression:
      #       dispatch — do the rebase + dispatch + poll (normal only).
      #       ingest   — do resolve + download + merge + commit (normal & recover
      #                  always; safety-net only when today's data is missing).
      - name: Plan run
        id: plan
        env:
          MODE: ${{ steps.mode.outputs.mode }}
          GAP_PRESENT: ${{ steps.gap.outputs.present }}
        run: |
          set -euo pipefail
          case "$MODE" in
            normal)  DISPATCH=true;  INGEST=true ;;
            recover) DISPATCH=false; INGEST=true ;;
            safety-net)
              DISPATCH=false
              if [ "$GAP_PRESENT" = "false" ]; then INGEST=true; else INGEST=false; fi ;;
            *) DISPATCH=true; INGEST=true ;;
          esac
          echo "dispatch=$DISPATCH" >> "$GITHUB_OUTPUT"
          echo "ingest=$INGEST"     >> "$GITHUB_OUTPUT"
          echo "🧭 plan: dispatch=$DISPATCH ingest=$INGEST (mode=$MODE gap_present='${GAP_PRESENT:-}')"

      # 1. Rebase the tt-metal branch onto upstream main so its build tooling
      #    (build-artifact.yaml etc.) stays current. Conflict => file an issue,
      #    do NOT dispatch.
      - name: Rebase tt-metal branch on main
        if: steps.plan.outputs.dispatch == 'true'
        env:
          GH_TOKEN: ${{ secrets.TT_METAL_PAT }}
        run: |
          set -euo pipefail
          git config --global user.name "Aswinmcw"
          git config --global user.email "aswin@aswincloud.com"
          AUTH="https://x-access-token:${GH_TOKEN}@github.com/${TT_REPO}.git"
          # tt-metal is multi-GB; blobless partial clone fetches only what a
          # branch rebase touches.
          git clone --filter=blob:none --no-checkout "$AUTH" ttm
          cd ttm
          # Record the branch's current remote SHA up front as the exact lease
          # expectation. In a fresh blobless clone the remote-tracking ref state
          # is unreliable for a bare --force-with-lease (it rejects with
          # "stale info" after the local rebase), so we pin the lease to this SHA.
          REMOTE_SHA=$(git ls-remote "$AUTH" "refs/heads/${TT_BRANCH}" | cut -f1)
          echo "Branch remote SHA before rebase: ${REMOTE_SHA:-<none>}"
          git fetch --no-tags origin main "${TT_BRANCH}"
          git checkout -B "${TT_BRANCH}" "${REMOTE_SHA}"
          if ! git rebase origin/main; then
            git rebase --abort || true
            echo "FAIL_KIND=rebase-conflict" >> "$GITHUB_ENV"
            echo "::error::tt-metal branch rebase conflicted with origin/main; not dispatching."
            exit 1
          fi
          # Lease pinned to the SHA we read: still aborts if someone else pushed
          # in between (their push would change the ref off REMOTE_SHA), but works
          # reliably in a fresh clone. No-op rebase pushes the same SHA harmlessly.
          if ! git push --force-with-lease="${TT_BRANCH}:${REMOTE_SHA}" "$AUTH" "HEAD:${TT_BRANCH}"; then
            echo "FAIL_KIND=rebase-push-failed" >> "$GITHUB_ENV"
            echo "::error::Rebase succeeded but push was rejected (branch moved underneath us?)."
            exit 1
          fi
          echo "✅ Rebased ${TT_BRANCH} on origin/main and pushed."

      # 2. Dispatch the sharded perf workflow on tt-metal + correlate the run.
      #    ONE run fans out to 2 boards x 2 shapes x 5 shards off a single build.
      - name: Dispatch tt-metal perf run
        id: dispatch
        if: steps.plan.outputs.dispatch == 'true'
        env:
          GH_TOKEN: ${{ secrets.TT_METAL_PAT }}
        run: |
          set -euo pipefail
          # Snapshot the existing test-dispatch runs on our branch BEFORE
          # dispatching, so we can identify the exact new run we create rather
          # than trusting "newest after a timestamp" (which could latch onto a
          # concurrent manual dispatch or a rerun on the same branch).
          list_runs() {
            gh run list -R "$TT_REPO" -w test-dispatch.yaml -e workflow_dispatch \
              -b "$TT_BRANCH" -L 100 --json databaseId -q '.[].databaseId' 2>/dev/null || true
          }
          BEFORE_IDS=$(list_runs | sort -u)
          # $SHARD / $SHARD_TOTAL are expanded by tt-metal's shard matrix at
          # runtime, so they are single-quoted here (no expansion on our runner).
          CMD='set -euo pipefail
          uv pip install ttperf
          curl -fsSL '"${RAW_BASE}"'/test_eltwise_operations.py -o /work/test_eltwise_operations.py
          curl -fsSL '"${RAW_BASE}"'/perf_measurement_script.py -o /work/perf_measurement_script.py
          cd /work && python perf_measurement_script.py --shard "$SHARD/$SHARD_TOTAL"'

          # The board list (N150/P100a) and their viommu labels + arch are
          # fixed in the tt-metal branch's matrix, so arch/runner-label inputs
          # are ignored — but the schema still marks them required, so pass
          # placeholders. tracy=true is needed for ttperf's profiler.
          # Leave 'description' and 'commit' at their defaults (do NOT set them).
          gh workflow run test-dispatch.yaml -R "$TT_REPO" --ref "$TT_BRANCH" \
            -f arch=wormhole_b0 \
            -f 'runner-label=["tt-ubuntu-2204-N150-viommu-stable"]' \
            -f tracy=true \
            -f command="$CMD"

          # gh workflow run returns no id. Poll for run IDs that are NEW since
          # our pre-dispatch snapshot (set difference). Exactly one new run is
          # expected; if two or more appear we can't attribute the artifacts
          # safely, so fail loudly rather than commit someone else's data.
          RUN_ID=""
          for i in $(seq 1 18); do
            NEW_IDS=$(comm -13 <(printf '%s\n' "$BEFORE_IDS") <(list_runs | sort -u) | grep -v '^$' || true)
            COUNT=$(printf '%s\n' "$NEW_IDS" | grep -c . || true)
            if [ "$COUNT" -ge 2 ]; then
              echo "FAIL_KIND=dispatch-ambiguous" >> "$GITHUB_ENV"
              echo "FAIL_DETAIL=multiple new runs on ${TT_BRANCH}: $(printf '%s ' $NEW_IDS)" >> "$GITHUB_ENV"
              echo "::error::Multiple new test-dispatch runs appeared on ${TT_BRANCH}; cannot attribute ours: $(printf '%s ' $NEW_IDS)"
              exit 1
            fi
            if [ "$COUNT" -eq 1 ]; then RUN_ID="$NEW_IDS"; break; fi
            sleep 10
          done
          if [ -z "$RUN_ID" ] || [ "$RUN_ID" = "null" ]; then
            echo "FAIL_KIND=dispatch-not-found" >> "$GITHUB_ENV"
            echo "::error::Dispatched but could not locate the tt-metal run."
            exit 1
          fi
          echo "run_id=$RUN_ID" >> "$GITHUB_OUTPUT"
          echo "🚀 tt-metal run: https://github.com/${TT_REPO}/actions/runs/${RUN_ID}"

      # 2b. Resolve the tt-metal run id every ingest mode will act on, so the
      #     Poll/Download/Slack steps never depend on the (skipped) Dispatch step.
      #       normal     — pass through the just-dispatched run.
      #       recover    — the run_id input if given, else the newest SUCCESSFUL
      #                    test-dispatch run on our branch.
      #       safety-net — always the newest successful run.
      #     Because recover/safety-net SKIP the Poll step (and thus its
      #     CONCL==success gate), this step re-validates that the resolved run is
      #     completed/successful — an operator-supplied run_id is untrusted.
      - name: Resolve tt-metal run
        id: resolve
        if: steps.plan.outputs.ingest == 'true'
        env:
          GH_TOKEN: ${{ secrets.TT_METAL_PAT }}
          MODE: ${{ steps.mode.outputs.mode }}
          INPUT_RUN_ID: ${{ github.event.inputs.run_id }}
          DISPATCH_RUN_ID: ${{ steps.dispatch.outputs.run_id }}
        run: |
          set -euo pipefail
          if [ "$MODE" = "normal" ]; then
            # Trust the dispatch+poll path; no re-validation (Poll already gated).
            RID="$DISPATCH_RUN_ID"
          else
            RID="${INPUT_RUN_ID:-}"
            if [ -n "$RID" ]; then
              echo "Using operator-supplied run id: $RID"
            else
              # Newest successful test-dispatch run on our branch. --status success
              # means auto-pick can't grab a failed/in-progress run; the explicit
              # id path is validated below regardless.
              RID=$(gh run list -R "$TT_REPO" -w test-dispatch.yaml -e workflow_dispatch \
                      -b "$TT_BRANCH" --status success -L 20 \
                      --json databaseId -q '.[0].databaseId' 2>/dev/null || true)
              echo "Auto-resolved newest successful run: ${RID:-<none>}"
            fi
            if [ -z "$RID" ] || [ "$RID" = "null" ]; then
              echo "FAIL_KIND=resolve-run-not-found" >> "$GITHUB_ENV"
              echo "::error::Could not resolve a tt-metal run to ingest (no successful run on ${TT_BRANCH}, and none supplied)."
              exit 1
            fi
            # Re-validate: recover/safety-net skip Poll's success gate, so confirm
            # the run actually completed successfully before we trust its shards.
            SC=$(gh run view "$RID" -R "$TT_REPO" --json status,conclusion \
                   -q '.status + "|" + (.conclusion // "")' 2>/dev/null || echo "|")
            ST="${SC%%|*}"; CO="${SC##*|}"
            echo "Resolved run $RID → status=$ST conclusion=$CO"
            if [ "$ST" != "completed" ] || [ "$CO" != "success" ]; then
              echo "FAIL_KIND=recover-run-not-successful" >> "$GITHUB_ENV"
              echo "FAIL_DETAIL=run $RID is status=$ST conclusion=$CO (need completed/success)" >> "$GITHUB_ENV"
              echo "::error::Resolved tt-metal run $RID is not completed/successful ($ST/$CO)."
              exit 1
            fi
          fi
          echo "run_id=$RID" >> "$GITHUB_OUTPUT"
          echo "📌 ingest target: https://github.com/${TT_REPO}/actions/runs/${RID}"

      # 3. Poll the tt-metal run (build + 20 shard cells) to completion. Skipped
      #    in recover/safety-net — the resolved run has already completed.
      - name: Poll tt-metal run
        if: steps.plan.outputs.dispatch == 'true'
        env:
          GH_TOKEN: ${{ secrets.TT_METAL_PAT }}
        run: |
          set -euo pipefail
          RUN_ID="${{ steps.resolve.outputs.run_id }}"
          # 5.5h, not 6h: a hosted job is hard-killed at GitHub's 6h (360m) cap,
          # and ~15m around this poll goes to dispatch + download/merge/PR, so a
          # literal 6h poll could never finish. 5.5h (330m) is the largest budget
          # that still lets THIS clean poll-timeout fire before GitHub's generic
          # kill, while covering the tt-metal dispatch->complete times now drifting
          # past 4h (queue + ~3h exec on the shared HW pool).
          DEADLINE=$(( $(date +%s) + 330*60 ))   # 5.5h
          ERRS=0                                  # consecutive failed polls
          MAX_ERRS=20                             # ~30 min of solid API failures
          ERRLOG=$(mktemp)                        # captured stderr of the last poll
          while :; do
            # A single flaky `gh run view` (GitHub API 500 / Connect-Timeout) must
            # NOT abort the whole run — it used to under set -e, ending the poll
            # while the tt-metal run was still queued (and the data was fine). Guard
            # the call: on failure, treat this tick as "unknown, keep waiting" and
            # only give up after MAX_ERRS consecutive failures (a real outage / bad
            # token), not one blip. Capture stderr (don't discard it) so the actual
            # cause — auth / rate-limit / network — shows in the log and the final
            # error, which matters for triage.
            if S=$(gh run view "$RUN_ID" -R "$TT_REPO" --json status,conclusion \
                     -q '.status + "|" + (.conclusion // "")' 2>"$ERRLOG"); then
              ERRS=0
              STATUS="${S%%|*}"; CONCL="${S##*|}"
              echo "$(date -u +%T) status=$STATUS conclusion=$CONCL"
              [ "$STATUS" = "completed" ] && break
            else
              ERRS=$(( ERRS + 1 ))
              ERRMSG=$(tr '\n' ' ' <"$ERRLOG" | sed 's/  */ /g'; :)
              echo "$(date -u +%T) poll error (${ERRS}/${MAX_ERRS}) — transient, retrying: ${ERRMSG}"
              if [ "$ERRS" -ge "$MAX_ERRS" ]; then
                echo "FAIL_KIND=poll-api-error" >> "$GITHUB_ENV"
                echo "FAIL_DETAIL=last API error: $(printf '%s' "$ERRMSG" | cut -c1-300)" >> "$GITHUB_ENV"
                echo "::error::gh run view kept failing (${ERRS} consecutive) — GitHub API outage or bad token. Last error: ${ERRMSG}"
                exit 1
              fi
            fi
            if [ "$(date +%s)" -ge "$DEADLINE" ]; then
              echo "FAIL_KIND=poll-timeout" >> "$GITHUB_ENV"
              echo "::error::tt-metal run did not complete within 5.5h."
              exit 1
            fi
            sleep 90
          done
          if [ "$CONCL" != "success" ]; then
            echo "FAIL_KIND=tt-run-failed" >> "$GITHUB_ENV"
            echo "FAIL_DETAIL=tt-metal run concluded '$CONCL' (https://github.com/${TT_REPO}/actions/runs/${RUN_ID})" >> "$GITHUB_ENV"
            echo "::error::tt-metal run concluded '$CONCL' (all-or-nothing: no data landed)."
            exit 1
          fi

      # 4. Download the 20 per-(board, shape) SHARD artifacts and merge each
      #    combo's shards locally. tt-metal only produces raw shards now — the
      #    merge lives HERE, using the perf_measurement_script.py already checked
      #    out in this repo (no raw.githubusercontent curl -> no 429 that a
      #    parallel-combine job on tt-metal used to hit). --merge is a device-free
      #    stdlib post-process; it writes eltwise_perf_results_<ts>_final.json,
      #    which the unchanged commit step below globs and lands.
      - name: Download shards + merge results
        id: download
        if: steps.plan.outputs.ingest == 'true'
        env:
          GH_TOKEN: ${{ secrets.TT_METAL_PAT }}
        run: |
          set -euo pipefail
          RUN_ID="${{ steps.resolve.outputs.run_id }}"
          for HW in $BOARDS; do
            for SHAPE in $SHAPES; do
              DEST="_artifact/${HW}/${SHAPE}"
              mkdir -p "$DEST/shards"
              # One call grabs all 5 shard artifacts for this combo; each extracts
              # into its own subdir under shards/, so glob recursively.
              gh run download "$RUN_ID" -R "$TT_REPO" \
                -p "eltwise-perf-results-${HW}-${SHAPE}-shard-*" -D "$DEST/shards"
              # Count shards up front (paths relative to the workspace root).
              NSHARD=$(find "$DEST/shards" -name 'shard-*.json' | wc -l)
              if [ "$NSHARD" -lt 5 ]; then
                echo "FAIL_KIND=artifact-missing" >> "$GITHUB_ENV"
                echo "FAIL_DETAIL=${HW}/${SHAPE}: found ${NSHARD} shard JSON(s), expected 5" >> "$GITHUB_ENV"
                echo "::error::${HW}/${SHAPE}: found ${NSHARD} shard JSON(s), expected 5."
                exit 1
              fi
              # Merge from inside the combo dir so (a) the shard paths passed to
              # --merge are relative to DEST and resolve after the cd, and (b) the
              # _final.json --merge writes to cwd lands right where the commit step
              # globs it. --merge needs no device / tt-metal.
              ( cd "$DEST" \
                && mapfile -t SHARDS < <(find shards -name 'shard-*.json' | sort) \
                && python3 "$GITHUB_WORKSPACE/perf_measurement_script.py" \
                     --merge "${SHARDS[@]}" >/dev/null )
              SRC=$(ls "$DEST"/eltwise_perf_results_*_final.json 2>/dev/null | head -1 || true)
              if [ -z "$SRC" ]; then
                echo "FAIL_KIND=merge-failed" >> "$GITHUB_ENV"
                echo "FAIL_DETAIL=${HW}/${SHAPE}: merge produced no *_final.json" >> "$GITHUB_ENV"
                echo "::error::${HW}/${SHAPE}: merge produced no eltwise_perf_results_*_final.json."
                exit 1
              fi
              # Use NSHARD (parent scope) — the SHARDS array is assigned inside the
              # ( … ) subshell above, so it's unbound here and would trip `set -u`.
              echo "📦 ${HW}/${SHAPE}: merged ${NSHARD} shards -> $SRC ($(wc -c <"$SRC") bytes)"
            done
          done

      # 5 + 6. Commit both boards under data/workflow/<hw>/<shape>/ in ONE PR (App
      #        token), approve (WRITE_ACCESS_PAT), enable squash auto-merge (App).
      - name: Mint App token
        id: app
        if: steps.plan.outputs.ingest == 'true'
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}

      - name: Commit results + open auto-merging PR
        if: steps.plan.outputs.ingest == 'true'
        env:
          GH_TOKEN: ${{ steps.app.outputs.token }}          # bot authors the PR
          APPROVE_TOKEN: ${{ secrets.WRITE_ACCESS_PAT }}     # different identity approves
          GUARD_DATE: ${{ steps.guard.outputs.date }}       # normal-mode date (today IST)
          MODE: ${{ steps.mode.outputs.mode }}
        run: |
          set -euo pipefail
          git config user.name "aswincloud-bot[bot]"
          git config user.email "aswincloud-bot[bot]@users.noreply.github.com"

          # DATE: in normal mode this is today-in-IST (the guard step). In
          # recover/safety-net the run may be ingested a day later, so "today" is
          # wrong — derive the business date from the merged file's own IST
          # measurement_date (metadata.measurement_date, e.g. 2026-07-16T04:55…
          # +05:30) and slice the first 10 chars (never Date-parse it). The
          # primary combo n150/small is always present; use it as the date source.
          DATE="$GUARD_DATE"
          if [ "$MODE" != "normal" ]; then
            PRIMARY=$(ls _artifact/N150/small/eltwise_perf_results_*.json | head -1)
            DATE=$(python3 -c "import json,sys; print(json.load(open(sys.argv[1]))['metadata']['measurement_date'][:10])" "$PRIMARY")
            echo "🗓️  recover/safety-net date from measurement_date: $DATE (guard was $GUARD_DATE)"
          fi

          # Safety-net-only staleness guard: the safety-net fires because TODAY's
          # data is missing, and Resolve auto-picks the newest *successful* run.
          # If today's tt-metal run ALSO failed, that newest-success is a PRIOR
          # day whose file already exists → the commit below would be a no-op and
          # exit 0 SILENTLY, leaving today genuinely missing with no alert. Detect
          # that (derived DATE != the safety-net's today) and fail loudly so the
          # cancel/failure notify fires. (Manual `recover` is exempt: backfilling
          # an older run by id is a legitimate operation there.)
          if [ "$MODE" = "safety-net" ] && [ "$DATE" != "$GUARD_DATE" ]; then
            echo "FAIL_KIND=safety-net-no-run-today" >> "$GITHUB_ENV"
            echo "FAIL_DETAIL=newest successful run is ${DATE}, not today (${GUARD_DATE}); today's run likely failed — nothing to recover automatically" >> "$GITHUB_ENV"
            echo "::error::Safety-net: no successful tt-metal run for ${GUARD_DATE} (newest is ${DATE}). Today's run failed — needs a manual dispatch/recover."
            exit 1
          fi

          BRANCH="workflow/perf-${DATE}-${{ github.run_id }}"
          git checkout -b "$BRANCH"

          # Drop each (board, shape) JSON into data/workflow/<hw>/<shape>/.
          for HW in $BOARDS; do
            SUBDIR=$(printf '%s' "$HW" | tr '[:upper:]' '[:lower:]')
            for SHAPE in $SHAPES; do
              SRC=$(ls _artifact/${HW}/${SHAPE}/eltwise_perf_results_*.json | head -1)
              mkdir -p "data/workflow/${SUBDIR}/${SHAPE}"
              DEST="data/workflow/${SUBDIR}/${SHAPE}/${DATE}_$(basename "$SRC")"
              cp "$SRC" "$DEST"
              git add "$DEST"
            done
          done

          # Regenerate the per-combo index + the latest_<hw>_<shape>.json
          # snapshots the dashboard reads. Scans data/workflow/**, merges the
          # legacy N150/32x32 history into n150_small, and writes
          # data/workflow/index.json + a latest file per NON-EMPTY combo.
          # Idempotent. Only combos with data get a latest file, so add each
          # explicitly and only if present (a combo with no run yet has none).
          python3 generate_workflow_index.py
          git add data/workflow/index.json
          for LATEST in n150_small n150_large p100a_small p100a_large; do
            [ -f "data/latest/latest_${LATEST}.json" ] && git add "data/latest/latest_${LATEST}.json"
          done
          # Do NOT touch data/daily/, data/index.json, or the legacy
          # data/latest/latest_results.json — those stay as the first-deploy
          # fallback; only the per-combo latest_<hw>_<shape>.json are written here.

          if git diff --cached --quiet; then
            echo "Nothing to commit (identical files already present); skipping PR."
            exit 0
          fi
          git commit -m "data(workflow): eltwise perf results ${DATE} (2 boards x 2 shapes)"
          git push "https://x-access-token:${GH_TOKEN}@github.com/${OUR_REPO}.git" "$BRANCH"

          # Note the ingest mode in the body so a recovered/backfilled day is
          # distinguishable from a fresh daily run in the PR history.
          ORIGIN="Automated daily"
          [ "$MODE" != "normal" ] && ORIGIN="Recovered (${MODE})"
          PR_URL=$(gh pr create -R "$OUR_REPO" --base main --head "$BRANCH" \
            --title "data(workflow): eltwise perf results ${DATE} (2 boards x 2 shapes)" \
            --body "${ORIGIN} tt-metal eltwise perf run — one build, 2 boards x 2 shapes (32x32, 1024x1024) x 5 shards. Data-only, isolated under \`data/workflow/{n150,p100a}/{small,large}/\`; does not touch \`data/index.json\`.")
          echo "Opened $PR_URL"

          # The membership-gated auto-approve workflow won't fire for a bot
          # author, so approve inline with a different write identity
          # (WRITE_ACCESS_PAT = Aswincloud-Bot, a codeowners-bypass member).
          GH_TOKEN="$APPROVE_TOKEN" gh pr review "$PR_URL" -R "$OUR_REPO" --approve \
            --body "Auto-approving daily perf data PR (generated, isolated under data/workflow/)."

          # No --delete-branch: the repo uses a merge queue, which rejects that
          # flag ("Cannot use --delete-branch when merge queue enabled") and
          # deletes the head branch itself on merge.
          gh pr merge "$PR_URL" -R "$OUR_REPO" --squash --auto
          echo "✅ Auto-merge enabled; merge queue will land it once checks pass."

      # 7. On any failure OR cancellation, file/dedupe an issue assigned to
      #    Aswinmcw. Cancellation is included because a hosted-runner SIGTERM
      #    (as on 2026-07-16) is a `cancelled()`, not a `failure()`, and used to
      #    slip through silently — even though the dispatched tt-metal run may
      #    have succeeded and the day is recoverable.
      - name: File issue on failure
        if: failure() || cancelled()
        uses: actions/github-script@v9
        with:
          script: |
            // A cancel has no FAIL_KIND (no step set one) -> label it 'cancelled'.
            const cancelled = '${{ job.status }}' === 'cancelled';
            const kind = process.env.FAIL_KIND || (cancelled ? 'cancelled' : 'pipeline-failure');
            const kindLabel = `ttnn-perf/${kind}`;
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const open = await github.rest.issues.listForRepo({
              owner: context.repo.owner, repo: context.repo.repo,
              state: 'open', labels: kindLabel,
            });
            if (open.data.length > 0) {
              await github.rest.issues.createComment({
                owner: context.repo.owner, repo: context.repo.repo,
                issue_number: open.data[0].number,
                body: `Recurred ${new Date().toISOString()} — ${runUrl}`,
              });
              core.info(`Commented on existing issue #${open.data[0].number}`);
            } else {
              const detail = kind === 'rebase-conflict'
                ? 'The tt-metal branch could not be rebased onto origin/main. **No dispatch was made** — resolve the conflict on `Aswinmcw/test_eltwise_perf` manually.'
                : kind === 'cancelled'
                ? 'The run was **cancelled** (hosted-runner shutdown or manual). The dispatched tt-metal run may have finished successfully — re-run this workflow with **mode=recover** to ingest it (or wait for the 23:30 UTC safety-net).'
                : `Stage: **${kind}**.`;
              await github.rest.issues.create({
                owner: context.repo.owner, repo: context.repo.repo,
                title: `Daily eltwise perf pipeline ${cancelled ? 'cancelled' : 'failed'}: ${kind}`,
                labels: ['ttnn-perf-pipeline', kindLabel, 'automated'],
                assignees: ['Aswinmcw'],
                body: `${detail}\n\nRun: ${runUrl}`,
              });
              core.info('Opened new failure issue.');
            }

      # 8. Ping Slack (C09CV1RTNJC) with the failing stage + a human reason so a
      #    failed day is noticed without watching Actions. Plain chat.postMessage
      #    curl (no third-party action to trust/pin); the SLACK_BOT_TOKEN org
      #    secret needs chat:write and the bot must be IN the channel. Payload is
      #    assembled with `jq --arg` (preinstalled on ubuntu-latest) so the reason
      #    / detail / API-error text are JSON-escaped safely — never hand-roll
      #    JSON around error strings in bash, and no heredoc (a python heredoc
      #    breaks under YAML block-scalar dedent). Skips silently if the token is
      #    absent (e.g. a fork) so it never turns a tokenless run red, and a Slack
      #    hiccup only warns — the issue was already filed above.
      - name: Notify Slack on failure or cancel
        if: failure() || cancelled()
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          SLACK_CHANNEL: C09CV1RTNJC
          FAIL_KIND: ${{ env.FAIL_KIND }}
          FAIL_DETAIL: ${{ env.FAIL_DETAIL }}
          JOB_STATUS: ${{ job.status }}
          # Prefer the resolved run; fall back to the dispatched one (resolve is
          # skipped on an early cancel, but dispatch may still have produced an id).
          TT_RUN_ID: ${{ steps.resolve.outputs.run_id || steps.dispatch.outputs.run_id }}
          RUN_DATE: ${{ steps.guard.outputs.date }}
        run: |
          set -euo pipefail
          if [ -z "${SLACK_BOT_TOKEN:-}" ]; then
            echo "SLACK_BOT_TOKEN not set — skipping Slack notification."
            exit 0
          fi
          # A cancel sets no FAIL_KIND (no step ran the mapping) -> derive it from
          # the job status so the message says "cancelled" with a recover hint,
          # rather than the generic unlabelled-failure text.
          KIND="${FAIL_KIND:-}"
          if [ -z "$KIND" ] && [ "${JOB_STATUS:-}" = "cancelled" ]; then KIND="cancelled"; fi
          KIND="${KIND:-pipeline-failure}"
          CANCEL_HINT=""
          # Map the machine FAIL_KIND to a one-line human reason.
          case "$KIND" in
            rebase-conflict)    REASON="tt-metal branch rebase conflicted with origin/main — no dispatch made." ;;
            rebase-push-failed) REASON="Rebase OK but the push was rejected (branch moved underneath us)." ;;
            dispatch-ambiguous) REASON="Multiple new test-dispatch runs appeared — couldn't attribute ours." ;;
            dispatch-not-found) REASON="Dispatched but the tt-metal run could not be located." ;;
            poll-api-error)     REASON="GitHub API kept failing while polling the tt-metal run (outage / bad token)." ;;
            poll-timeout)       REASON="tt-metal run did not complete within 5.5h." ;;
            tt-run-failed)      REASON="The tt-metal run itself failed (all-or-nothing: no data landed)." ;;
            artifact-missing)   REASON="A board/shape combo was missing shard artifacts (expected 5)." ;;
            merge-failed)       REASON="Shard merge produced no results JSON." ;;
            resolve-run-not-found)       REASON="Recover: no successful tt-metal run to ingest (and none supplied)." ;;
            recover-run-not-successful)  REASON="Recover: the supplied tt-metal run is not completed/successful." ;;
            safety-net-no-run-today)     REASON="Safety-net: today's tt-metal run failed — no successful run to auto-ingest. Needs a manual dispatch/recover." ;;
            cancelled)          REASON="Run was cancelled (hosted-runner shutdown or manual)."
                                CANCEL_HINT="The dispatched tt-metal run may have finished OK — re-run with *mode=recover* to ingest it, or wait for the 23:30 UTC safety-net." ;;
            pipeline-failure|*) REASON="Pipeline failed at an unlabelled stage." ;;
          esac
          RUN_URL="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
          DATE="${RUN_DATE:-n/a}"
          TT_URL=""
          [ -n "${TT_RUN_ID:-}" ] && TT_URL="https://github.com/${TT_REPO}/actions/runs/${TT_RUN_ID}"
          if [ "$KIND" = "cancelled" ]; then
            HEADER="⚠️ Daily eltwise perf pipeline cancelled"; LEAD=":warning: Daily eltwise perf pipeline cancelled"
          else
            HEADER="🚨 Daily eltwise perf pipeline failed";    LEAD=":rotating_light: Daily eltwise perf pipeline failed"
          fi

          # Assemble the whole mrkdwn body INSIDE jq (not via bash $(...), which
          # strips the trailing newlines and runs the lines together). Optional
          # Detail / cancel-hint / tt-metal-run link are appended only when set.
          PAYLOAD=$(jq -n \
            --arg channel "$SLACK_CHANNEL" \
            --arg reason  "$REASON" \
            --arg kind    "$KIND" \
            --arg detail  "${FAIL_DETAIL:-}" \
            --arg hint    "$CANCEL_HINT" \
            --arg date    "$DATE" \
            --arg runurl  "$RUN_URL" \
            --arg tturl   "$TT_URL" \
            --arg header  "$HEADER" \
            --arg lead    "$LEAD" '
            ( "*Reason:* " + $reason
              + "\n*Stage:* `" + $kind + "`"
              + (if $detail != "" then "\n*Detail:* " + $detail else "" end)
              + (if $hint   != "" then "\n" + $hint else "" end)
              + "\n*Date:* " + $date
              + "\n<" + $runurl + "|pipeline run>"
              + (if $tturl != "" then " · <" + $tturl + "|tt-metal run>" else "" end)
            ) as $body |
            { channel: $channel,
              text: ($lead + " (" + $date + ") — " + $reason),
              blocks: [
                {type:"header", text:{type:"plain_text", text:$header, emoji:true}},
                {type:"section", text:{type:"mrkdwn", text:$body}}
              ] }')

          # Slack returns HTTP 200 even on logical errors; inspect the JSON "ok".
          RESP=$(curl -sS -X POST https://slack.com/api/chat.postMessage \
            -H "Authorization: Bearer ${SLACK_BOT_TOKEN}" \
            -H 'Content-Type: application/json; charset=utf-8' \
            --data "$PAYLOAD")
          if printf '%s' "$RESP" | grep -q '"ok":true'; then
            echo "✅ Slack notified (${KIND})."
          else
            echo "::warning::Slack notify failed: ${RESP}"
          fi
