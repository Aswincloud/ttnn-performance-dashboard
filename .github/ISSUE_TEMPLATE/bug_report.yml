name: Bug report
description: Something on the dashboard isn't working as expected.
title: "bug: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to file a bug. Please search existing issues first to avoid duplicates.
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear description of what you saw.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: What did you expect to happen?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Open …
        2. Click …
        3. Notice that …
    validations:
      required: true
  - type: input
    id: environment
    attributes:
      label: Browser / device
      placeholder: e.g. Chrome 124 on macOS, Safari on iPhone 12
  - type: textarea
    id: screenshots
    attributes:
      label: Screenshots / console logs
      description: Drag images directly into this field. Paste console errors verbatim if relevant.
