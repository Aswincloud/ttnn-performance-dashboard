name: UI improvement
description: Suggest a visual or UX change to the dashboard.
title: "ui: "
labels: ["ui", "enhancement"]
body:
  - type: textarea
    id: improvement
    attributes:
      label: What should change?
      description: Describe the part of the UI you'd like to see different.
    validations:
      required: true
  - type: textarea
    id: why
    attributes:
      label: Why does this matter?
      description: What problem does it solve, or which user does it help?
    validations:
      required: true
  - type: textarea
    id: mockup
    attributes:
      label: Mockup or reference (optional)
      description: Sketches, screenshots, or links to similar UIs you'd like to emulate.
  - type: dropdown
    id: viewport
    attributes:
      label: Which viewport?
      multiple: true
      options:
        - Desktop
        - Tablet
        - Mobile portrait
        - Mobile landscape
