name = "ttnn-eltwise-performance"
compatibility_date = "2025-07-17"

# Worker entry. Static assets (the built dashboard) are served first; only
# requests with no matching asset — i.e. the /api/* routes — fall through to
# this script's fetch handler. The SPA therefore serves exactly as before.
main = "worker/index.js"

# Pin Preview URLs on so the dashboard toggle isn't reset on every `wrangler deploy`.
# With workers_dev unset (custom-domain setup), the default is off, which means each
# deploy was flipping the toggle back and stripping the Preview URL from PR comments.
# https://developers.cloudflare.com/workers/configuration/previews/
preview_urls = true

[assets]
directory = "./dist"
# Bind the assets so the Worker can both serve the SPA (env.ASSETS.fetch) and
# read the baked-in performance JSON during the scheduled alert run.
binding = "ASSETS"

# D1 database backing the alert subscriptions. Create it once with
#   npx wrangler d1 create ttnn-alerts
# then paste the printed database_id below.
[[d1_databases]]
binding = "DB"
database_name = "ttnn-alerts"
database_id = "178062f1-eba8-4c48-b741-a4409165d41f"

# Per-IP rate limit on the subscribe endpoint: at most 5 requests per IP per
# 60s window (period must be 10 or 60). Native binding — no storage, no IP
# retention. Keyed on CF-Connecting-IP in worker/index.js.
[[ratelimits]]
name = "SUBSCRIBE_LIMITER"
namespace_id = "1001"
simple = { limit = 5, period = 60 }

# Daily alert run. Data is published ~02:00 UTC; 04:00 leaves margin for the
# per-push redeploy to land the new data before we read it.
[triggers]
crons = ["0 4 * * *"]

[vars]
SITE_URL = "https://ttnn-eltwise-performance.aswincloud.com"
# Where to send a heads-up when someone confirms or unsubscribes. Leave unset to
# disable admin notifications. Must be deliverable from the Resend FROM_EMAIL domain.
ADMIN_EMAIL = "aswin@aswincloud.com"

# Custom domain configuration
[[routes]]
pattern = "ttnn-eltwise-performance.aswincloud.com/*"
zone_name = "aswincloud.com"
